<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>AI Call Agent</title>

    <!-- <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.10.1/dist/twilio.min.js"></script> -->
    <script src="https://unpkg.com/@twilio/voice-sdk@2.10.0/dist/twilio.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }

        #call-btn {
            background: #22c55e;
            color: white;
        }

        #hangup-btn {
            background: #ef4444;
            color: white;
            display: none;
        }

        #status {
            font-size: 16px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>🤖 AI Call Agent</h2>
    <button id="call-btn">📞 Call Karo</button>
    <button id="hangup-btn">📵 Hang Up</button>
    <p id="status">Loading...</p>

    <script>
        let device;
        let call;
        const status = document.getElementById('status');
        const callBtn = document.getElementById('call-btn');
        const hangupBtn = document.getElementById('hangup-btn');

        async function setup() {
            try {
                const res = await fetch('/token');
                const { token } = await res.json();

                // ✅ Naya SDK syntax
                device = new Twilio.Device(token);

                device.on('registered', () => {
                    status.textContent = '✅ Ready — Call kar sakte ho!';
                });

                device.on('error', (err) => {
                    status.textContent = '❌ Error: ' + err.message;
                    console.error(err);
                });

                device.on('incoming', (incomingCall) => {
                    call = incomingCall;
                    call.accept();
                });

                // ✅ Naya SDK mein register() call karna zaroori hai
                await device.register();

            } catch (err) {
                status.textContent = '❌ Setup failed: ' + err.message;
                console.error(err);
            }
        }

        callBtn.addEventListener('click', async () => {
            try {
                status.textContent = '⏳ Connecting...';
                // ✅ Naya SDK mein connect() async hai
                call = await device.connect();

                call.on('accept', () => {
                    status.textContent = '🟢 Call Connected!';
                    callBtn.style.display = 'none';
                    hangupBtn.style.display = 'inline-block';
                });

                call.on('disconnect', () => {
                    status.textContent = '✅ Ready — Call kar sakte ho!';
                    callBtn.style.display = 'inline-block';
                    hangupBtn.style.display = 'none';
                });

                call.on('error', (err) => {
                    status.textContent = '❌ Call Error: ' + err.message;
                    console.error(err);
                });

            } catch (err) {
                status.textContent = '❌ Connect failed: ' + err.message;
            }
        });

        hangupBtn.addEventListener('click', () => {
            call?.disconnect();
        });

        setup();
    </script>
</body>

</html>
