<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>AI Call Agent</title>
    <script src="https://sdk.twilio.com/js/client/releases/1.13.0/twilio.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }

        button {
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }

        #call-btn {
            background: #22c55e;
            color: white;
        }

        #hangup-btn {
            background: #ef4444;
            color: white;
            display: none;
        }

        #status {
            font-size: 16px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>🤖 AI Call Agent</h2>
    <button id="call-btn">📞 Call Karo</button>
    <button id="hangup-btn">📵 Hang Up</button>
    <p id="status">Loading...</p>

    <script>
        let device;
        let connection;
        const status = document.getElementById('status');
        const callBtn = document.getElementById('call-btn');
        const hangupBtn = document.getElementById('hangup-btn');

        // Token lo aur device setup karo
        async function setup() {
            const res = await fetch('/token');
            const { token } = await res.json();

            device = new Twilio.Device(token, { codecPreferences: ['opus', 'pcmu'] });

            device.on('ready', () => status.textContent = '✅ Ready — Call kar sakte ho!');
            device.on('error', (err) => status.textContent = '❌ Error: ' + err.message);
            device.on('connect', () => {
                status.textContent = '🟢 Call Connected!';
                callBtn.style.display = 'none';
                hangupBtn.style.display = 'inline-block';
            });
            device.on('disconnect', () => {
                status.textContent = '✅ Ready — Call kar sakte ho!';
                callBtn.style.display = 'inline-block';
                hangupBtn.style.display = 'none';
            });
        }

        // Call karo
        callBtn.addEventListener('click', () => {
            connection = device.connect();
            status.textContent = '⏳ Connecting...';
        });

        // Hang up karo
        hangupBtn.addEventListener('click', () => {
            device.disconnectAll();
        });

        setup();
    </script>
</body>

</html>
