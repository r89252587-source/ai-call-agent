<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>AI Call Agent</title>
</head>

<body>
    <h2>🤖 AI Call Agent</h2>
    <button id="call-btn"
        style="padding:20px 40px;font-size:20px;background:#22c55e;color:white;border:none;border-radius:50px;cursor:pointer;">📞
        Call Karo</button>
    <button id="hangup-btn"
        style="padding:20px 40px;font-size:20px;background:#ef4444;color:white;border:none;border-radius:50px;cursor:pointer;display:none;">📵
        Hang Up</button>
    <p id="status" style="font-size:16px;color:#666;">⏳ Loading SDK...</p>
    <p id="error-detail" style="font-size:13px;color:red;"></p>

    <!-- ✅ Sahi SDK — Direct Twilio CDN se -->
    <script src="https://sdk.twilio.com/js/voice/releases/2.11.0/twilio.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error-detail');
        const callBtn = document.getElementById('call-btn');
        const hangupBtn = document.getElementById('hangup-btn');

        let device, call;

        function log(msg, isError) {
            console.log(msg);
            statusEl.textContent = msg;
            if (isError) errorEl.textContent = msg;
        }

        async function setup() {
            try {
                log('🔄 Token le raha hun...');
                const res = await fetch('/token');
                if (!res.ok) throw new Error('Token fetch failed: ' + res.status);

                const { token } = await res.json();
                log('✅ Token mila — Device bana raha hun...');

                // ✅ edge: 'roaming' — 53000 fix karta hai
                device = new Twilio.Device(token, {
                    edge: 'roaming',
                    logLevel: 1,
                    codecPreferences: ['opus', 'pcmu']
                });

                device.on('registered', () => {
                    log('✅ Ready! Call kar sakte ho.');
                    callBtn.disabled = false;
                });

                device.on('error', (twilioError) => {
                    log('❌ Error ' + twilioError.code + ': ' + twilioError.message, true);
                    console.error(twilioError);
                });

                device.on('incoming', (incomingCall) => {
                    call = incomingCall;
                    call.accept();
                });

                log('🔄 Registering...');
                callBtn.disabled = true;
                await device.register();

            } catch (err) {
                log('❌ Setup failed: ' + err.message, true);
                console.error(err);
            }
        }

        callBtn.addEventListener('click', async () => {
            try {
                log('⏳ Connecting...');
                call = await device.connect({
                    params: { To: 'ai-agent' }
                });

                call.on('accept', () => {
                    log('🟢 Call Connected!');
                    callBtn.style.display = 'none';
                    hangupBtn.style.display = 'inline-block';
                });

                call.on('disconnect', () => {
                    log('✅ Ready! Call kar sakte ho.');
                    callBtn.style.display = 'inline-block';
                    hangupBtn.style.display = 'none';
                });

                call.on('error', (err) => {
                    log('❌ Call Error ' + err.code + ': ' + err.message, true);
                });

            } catch (err) {
                log('❌ Connect failed: ' + err.message, true);
            }
        });

        hangupBtn.addEventListener('click', () => {
            call?.disconnect();
        });

        // SDK load hone ke baad setup
        window.onload = setup;
    </script>
</body>

</html>
