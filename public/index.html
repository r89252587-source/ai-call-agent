<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>AI Call Agent</title>
</head>

<body>
    <h2>🤖 AI Call Agent</h2>
    <button id="call-btn"
        style="padding:20px 40px;font-size:20px;background:#22c55e;color:white;border:none;border-radius:50px;cursor:pointer;margin:10px;">📞
        Call Karo</button>
    <button id="hangup-btn"
        style="padding:20px 40px;font-size:20px;background:#ef4444;color:white;border:none;border-radius:50px;cursor:pointer;display:none;margin:10px;">📵
        Hang Up</button>
    <p id="status" style="font-size:16px;color:#666;">⏳ Loading...</p>
    <p id="error-detail" style="font-size:12px;color:red;"></p>

    <!-- ✅ Local file — CDN problem nahi hogi -->
    <script src="/twilio.min.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error-detail');
        const callBtn = document.getElementById('call-btn');
        const hangupBtn = document.getElementById('hangup-btn');

        let device, call;

        function log(msg, isError) {
            statusEl.textContent = msg;
            if (isError) errorEl.textContent = '🔍 Detail: ' + msg;
            console.log(msg);
        }

        async function setup() {
            // ✅ Check karo SDK load hua ya nahi
            if (typeof Twilio === 'undefined') {
                log('❌ SDK load nahi hua — twilio.min.js file check karo', true);
                return;
            }

            try {
                log('🔄 Token le raha hun...');
                const res = await fetch('/token');
                if (!res.ok) throw new Error('Token fetch failed: ' + res.status);
                const { token } = await res.json();

                log('✅ Token mila — Device bana raha hun...');

                device = new Twilio.Device(token, {
                    edge: 'roaming',
                    logLevel: 1,
                    codecPreferences: ['opus', 'pcmu']
                });

                device.on('registered', () => {
                    log('✅ Ready! Call kar sakte ho.');
                    callBtn.disabled = false;
                });

                device.on('error', (err) => {
                    log('❌ Error ' + err.code + ': ' + err.message, true);
                });

                callBtn.disabled = true;
                log('🔄 Registering...');
                await device.register();

            } catch (err) {
                log('❌ Setup failed: ' + err.message, true);
                console.error(err);
            }
        }

        callBtn.addEventListener('click', async () => {
            try {
                log('⏳ Connecting...');
                call = await device.connect({ params: { To: 'ai-agent' } });

                call.on('accept', () => {
                    log('🟢 Call Connected!');
                    callBtn.style.display = 'none';
                    hangupBtn.style.display = 'inline-block';
                });

                call.on('disconnect', () => {
                    log('✅ Ready! Call kar sakte ho.');
                    callBtn.style.display = 'inline-block';
                    hangupBtn.style.display = 'none';
                });

                call.on('error', (err) => {
                    log('❌ Call Error: ' + err.message, true);
                });

            } catch (err) {
                log('❌ Connect failed: ' + err.message, true);
            }
        });

        hangupBtn.addEventListener('click', () => call?.disconnect());

        window.onload = setup;
    </script>
</body>

</html>
